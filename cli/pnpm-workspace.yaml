# pnpm 11 settings for this package.
# Allow esbuild (a vitest dependency) to run its install script.
onlyBuiltDependencies:
  - esbuild
# Don't re-verify/instal deps before each `pnpm run` script. The esbuild binary
# works without its optional build step, so the check is a false negative here.
verifyDepsBeforeRun: false
